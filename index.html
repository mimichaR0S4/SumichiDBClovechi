<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>すみちだぶちらぶち</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 背景フラッシュ */
.flash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: white;
  animation: flash 0.2s ease-out;
  z-index: 2;
}

@keyframes flash {
  0% { opacity: 1; }
  100% { opacity: 0; }
}

/* 文字 */
h1 {
  font-size: 18vw;
  font-weight: bold;
  text-align: center;
  color: white;
  opacity: 0;
  transform: scale(0);
  animation: impact 0.5s ease-out forwards;
  z-index: 3;
}

/* ドン演出 */
@keyframes impact {
  0% {
    opacity: 0;
    transform: scale(0);
  }
  70% {
    opacity: 1;
    transform: scale(1.3);
  }
  100% {
    transform: scale(1);
  }
}
</style>

</head>
<body>

<div class="flash"></div>
<h1>すみちだぶちらぶち</h1>

<script>
// 一回だけ音（タップ不要に近づける）
window.onload = () => {
  const audio = new Audio("https://www.myinstants.com/media/sounds/vine-boom.mp3");
  audio.volume = 0.8;
  audio.play().catch(()=>{});
};
</script>

</body>
</html>
