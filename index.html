<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>？？？</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    color: white;
    font-family: sans-serif;
    text-align: center;
}

/* 背景フラッシュ */
.flash-bg {
    animation: bgFlash 0.1s infinite alternate;
}

@keyframes bgFlash {
    from { background: black; }
    to { background: darkred; }
}

/* 数字 */
#numbers {
    font-size: 60px;
    margin-top: 30vh;
    letter-spacing: 20px;
}

/* 最終文字 */
#result {
    display: none;
    font-size: 45px;
    margin-top: 30vh;
    animation: zoom 0.5s ease forwards;
    color: gold;
    text-shadow: 0 0 20px red, 0 0 40px yellow;
}

@keyframes zoom {
    0% {transform: scale(0); opacity: 0;}
    100% {transform: scale(1.3); opacity: 1;}
}

/* キラキラ */
.spark {
    position: absolute;
    width: 5px;
    height: 5px;
    background: yellow;
    border-radius: 50%;
    animation: sparkle 1s linear infinite;
}

@keyframes sparkle {
    from {transform: translateY(0);}
    to {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<div id="numbers">???</div>
<div id="result">すみちだぶちらぶち</div>

<script>
const numbers = document.getElementById("numbers");
const result = document.getElementById("result");

// ランダム数字を回す
let interval = setInterval(() => {
    let n1 = Math.floor(Math.random() * 9) + 1;
    let n2 = Math.floor(Math.random() * 9) + 1;
    let n3 = Math.floor(Math.random() * 9) + 1;
    numbers.textContent = n1 + " " + n2 + " " + n3;
}, 80);

// 確変突入（背景フラッシュ）
setTimeout(() => {
    document.body.classList.add("flash-bg");
}, 2000);

// 停止→結果
setTimeout(() => {
    clearInterval(interval);
    numbers.style.display = "none";
    result.style.display = "block";

    // キラキラ生成
    for (let i = 0; i < 50; i++) {
        let spark = document.createElement("div");
        spark.className = "spark";
        spark.style.left = Math.random() * 100 + "vw";
        spark.style.top = Math.random() * 100 + "vh";
        spark.style.animationDuration = (Math.random() * 1 + 0.5) + "s";
        document.body.appendChild(spark);
    }
}, 4000);
</script>

</body>
</html>
