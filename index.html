<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひみつ♡</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", "Hiragino Maru Gothic ProN", sans-serif;
    text-align: center;
    color: white;
    background: pink;
}

/* 背景ふわふわ */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #ff9de2, #ffc0cb, #ffb6c1);
    animation: bgMove 5s infinite alternate;
}

@keyframes bgMove {
    from { filter: hue-rotate(0deg); }
    to { filter: hue-rotate(40deg); }
}

/* 数字 */
#numbers {
    position: relative;
    font-size: 50px;
    margin-top: 30vh;
    letter-spacing: 15px;
    z-index: 2;
}

/* 結果 */
#result {
    display: none;
    position: relative;
    font-size: 40px;
    margin-top: 30vh;
    z-index: 2;
    color: white;
    text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493;
    animation: pop 0.6s ease forwards;
}

@keyframes pop {
    0% {transform: scale(0); opacity: 0;}
    100% {transform: scale(1.3); opacity: 1;}
}

/* ハート */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: float 3s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

/* キラキラ */
.spark {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: sparkle 1s linear infinite;
}

@keyframes sparkle {
    from {transform: scale(0);}
    to {transform: scale(1.5);}
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="numbers">♡ ♡ ♡</div>
<div id="result">すみちだぶちらぶち♡</div>

<script>
const numbers = document.getElementById("numbers");
const result = document.getElementById("result");

// ハート生成
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
}, 200);

// 数字（ハート風）
let interval = setInterval(() => {
    let h = ["💖","💗","💘","💞"];
    numbers.textContent =
        h[Math.floor(Math.random()*4)] + " " +
        h[Math.floor(Math.random()*4)] + " " +
        h[Math.floor(Math.random()*4)];
}, 100);

// 停止→結果
setTimeout(() => {
    clearInterval(interval);
    numbers.style.display = "none";
    result.style.display = "block";

    // キラキラ
    for (let i = 0; i < 40; i++) {
        let s = document.createElement("div");
        s.className = "spark";
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        document.body.appendChild(s);
    }
}, 4000);
</script>

</body>
</html>
