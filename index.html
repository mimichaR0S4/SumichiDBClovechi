<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>すみちだぶちらぶち</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 背景ぐるぐる */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: conic-gradient(red, orange, yellow, green, cyan, blue, violet, red);
  animation: spin 5s linear infinite;
  z-index: 0;
  filter: blur(100px);
}

/* 文字 */
h1 {
  position: relative;
  font-size: 12vw;
  font-weight: bold;
  text-align: center;
  z-index: 1;
  color: white;
  animation: glitch 0.1s infinite, zoom 2s infinite alternate;
}

/* 拡大縮小 */
@keyframes zoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.3); }
}

/* 背景回転 */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* バグ風 */
@keyframes glitch {
  0% { transform: translate(0,0); }
  20% { transform: translate(-5px,5px); }
  40% { transform: translate(5px,-5px); }
  60% { transform: translate(-5px,-5px); }
  80% { transform: translate(5px,5px); }
  100% { transform: translate(0,0); }
}
</style>

</head>
<body>

<h1>すみちだぶちらぶち</h1>

<script>
/* クリックで音 */
document.body.onclick = () => {
  const audio = new Audio("https://www.myinstants.com/media/sounds/vine-boom.mp3");
  audio.play();
};

/* 勝手に文字増殖 */
setInterval(() => {
  const clone = document.createElement("div");
  clone.innerText = "すみちだぶちらぶち";
  clone.style.position = "absolute";
  clone.style.left = Math.random()*100 + "vw";
  clone.style.top = Math.random()*100 + "vh";
  clone.style.color = "white";
  clone.style.fontSize = "2vw";
  document.body.appendChild(clone);
}, 200);
</script>

</body>
</html>
