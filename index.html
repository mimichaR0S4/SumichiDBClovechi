  <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>すみちだぶちらぶち</title>
<style>
body {
  margin:0;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

h1{
  font-size:15vw;
  color:white;
  animation: shake 0.1s infinite, zoom 1s infinite alternate;
}

/* 震え */
@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-10px,10px); }
  50% { transform: translate(10px,-10px); }
  75% { transform: translate(-10px,-10px); }
  100% { transform: translate(0,0); }
}

/* 拡大 */
@keyframes zoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.5); }
}
</style>
</head>
<body>
<h1>すみちだぶちらぶち</h1>

<script>
alert("すみちだぶちらぶち");
</script>

</body>
</html>
